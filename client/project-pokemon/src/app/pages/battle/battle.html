@if (battle()) {
    <div id="canvas">
        <div class="enemy">
            <div class="life-bar">
                <div class="health"></div>
            </div>
            <img [src]="battleInfo()!.pokemonB.sprite">
        </div>
        <div class="ally">
            <img [src]="battleInfo()!.pokemonA.sprite">
            <div class="life-bar">
                <div class="health"></div>
            </div>
        </div>
        <div style="position: relative;">
            <div id="moves">
                @for (move of battleInfo()!.pokemonA.moves; track $index) {
                    <app-movement-button 
                        [move]="move" 
                        [disabled]="move.currentPp === 0"
                        (moveClicked)="attack($event)">
                    </app-movement-button>
                }
            </div>
            <app-battle-log-overlay [log]="battleLog()" [visible]="showLogOverlay()"></app-battle-log-overlay>
        </div>
        @if (showFinishDialog()) {
            <app-finish-battle-dialog
                [hpA]="hpA()"
                [hpB]="hpB()"
                [pokemonAName]="battleInfo()!.pokemonA.name"
                [pokemonBName]="battleInfo()!.pokemonB.name"
                (retry)="onRetryBattle()"
            ></app-finish-battle-dialog>
        }
    </div>
} @else {
    <div>Cargando combate...</div>
}
