@if (combate()) {
    <div id="canvas">
        <div class="enemy">
            <div class="life-bar">
                <div class="health"></div>
            </div>
            <img [src]="battleInfo()!.pokemonB.sprite">
        </div>
        <div class="ally">
            <img [src]="battleInfo()!.pokemonA.sprite">
            <div class="life-bar">
                <div class="health"></div>
            </div>
        </div>
            <div id="moves">
                @if (turno() == true) {
                    @for (move of battleInfo()!.pokemonA.moves; track $index) {
                        <app-movement-button 
                            [move]="move" 
                            [disabled]="false"
                            (moveClicked)="ataca($event)">
                        </app-movement-button>
                    }
                } @else {
                    @for (move of battleInfo()!.pokemonA.moves; track $index) {
                        <app-movement-button 
                            [move]="move" 
                            [disabled]="true"
                            (moveClicked)="ataca($event)">
                        </app-movement-button>
                    }
                }
            </div>
    </div>
} @else {
    <div>Cargando combate...</div>
}
