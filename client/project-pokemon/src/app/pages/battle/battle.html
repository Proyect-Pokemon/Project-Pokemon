@if (combate()) {
    <div id="canvas">
        <div class="enemy">
            <div class="life-bar">
                <div class="health"></div>
            </div>
            <img [src]="battleInfo()!.pokemonB.sprite">
        </div>
        <div class="ally">
            <img [src]="battleInfo()!.pokemonA.sprite">
            <div class="life-bar">
                <div class="health"></div>
            </div>
        </div>
            <div id="moves">
                @if (turno() == true) {
                    @for (move of battleInfo()!.pokemonA.moves; track $index) {
                        <button (click)="ataca(move)" [class]="'move type-' + move.type.toLowerCase()">
                            <img [src]="'assets/icons/types/' + move.type.toLowerCase() + '.svg'" [alt]="move.type">
                            <span class="move-name">{{move.name}}</span>
                            <span class="move-pp">{{move.currentPp}}/{{move.pp}}</span>
                        </button>
                    }
                } @else {
                    @for (move of battleInfo()!.pokemonA.moves; track $index) {
                        <button (click)="ataca(move)" [class]="'move type-' + move.type.toLowerCase()" disabled>
                            <img [src]="'assets/icons/types/' + move.type.toLowerCase() + '.svg'" [alt]="move.type">
                            <span class="move-name">{{move.name}}</span>
                            <span class="move-pp">{{move.currentPp}}/{{move.pp}}</span>
                        </button>
                    }
                }
            </div>
    </div>
} @else {
    <div>Cargando combate...</div>
}
