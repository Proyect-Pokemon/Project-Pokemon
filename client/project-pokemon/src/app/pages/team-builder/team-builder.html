<div class="team-builder-container">
    <div class="teams-section">
        <h1>Crear equipos</h1>
        
        <div class="teams-list">
        @if (isLoadingTeams()) {
            <app-team-slot-skeleton />
            <app-team-slot-skeleton />
            <app-team-slot-skeleton />
        } @else {
            @for (team of teams(); track team.id) {
                <app-team-slot 
                [team]="team"
                (toggleExpand)="toggleTeamExpansion($event)"
                (nameChange)="updateTeamName($event)"
                (addPokemon)="handleAddPokemon($event)"
                />
            }
            
            @if (canAddMoreTeams()) {
                <button class="add-team-button" (click)="addTeam()">
                <span class="plus-icon">+</span>
                <span>Añadir Equipo</span>
                </button>
            }
        }
        </div>
    </div>
</div>

<!-- Panel editor de pokémon -->
<app-pokemon-editor-panel
    [isOpen]="isPanelOpen"
    [teamId]="selectedTeamId"
    [slot]="selectedSlot"
    [pokemonDisplayName]="selectedPokemonDisplayName"
    [pokemonSprite]="selectedPokemonSprite"
    [pokemonId]="selectedPokemonId"
    [pokemonTeamId]="selectedPokemonTeamId"
    [pokemonBaseName]="selectedPokemonBaseName"
    [pokemonNickname]="selectedPokemonNickname"
    [natureId]="selectedNatureId"
    [movementIds]="selectedMovementIds"
    (createPokemonTeam)="handleCreatePokemonTeam($event)"
    (changeSlot)="handleChangeSlot($event)"
    (nicknameUpdated)="handleNicknameUpdated($event)"
    (close)="closePanel()"
/>
