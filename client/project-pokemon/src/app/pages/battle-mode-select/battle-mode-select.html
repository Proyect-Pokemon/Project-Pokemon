<div class="battle-mode-selector">
    <div class="container">
        <h1 class="title">Elige un modo de combate</h1>

        <div class="modes-container">
            <button type="button" class="mode-button mode-cpu" (click)="goToVsMachine()">
                <span>VS. CPU</span>
            </button>

            <button type="button" class="mode-button mode-online" disabled>
                <span>VS. ONLINE</span>
            </button>

            <button type="button" class="mode-button mode-friend" disabled>
                <span>VS. AMIGO</span>
            </button>
        </div>
    </div>
</div>
