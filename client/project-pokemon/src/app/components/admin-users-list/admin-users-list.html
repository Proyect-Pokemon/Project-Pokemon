<ul class="users-list">
  @for (user of users(); track user.id) {
    <li class="user-card" [class.is-admin]="user.role === 'admin'">
      <div class="user-card-main">
        <img
          [src]="user.avatarUrl"
          [alt]="'Avatar de ' + user.nickname"
          class="user-avatar"
        />
        <div class="user-data">
          <h2>
            {{ user.nickname }}
            @if (user.role === 'admin') {
              <span class="role-badge">admin</span>
            }
          </h2>
          <p class="user-email">{{ user.email }}</p>
          <p class="user-date">Miembro desde {{ formatDate(user.creationDate) }}</p>
        </div>
      </div>

      <div class="user-actions">
        <div class="role-control">
          <label [attr.for]="'role-select-' + user.id">Rol</label>
          <select
            [id]="'role-select-' + user.id"
            [value]="user.role"
            [disabled]="isRoleUpdating()(user.id) || isDeletingUser()(user.id) || isLastAdmin()(user.id)"
            (change)="onRoleSelectChange(user.id, $event)"
          >
            <option value="user">user</option>
            <option value="admin">admin</option>
          </select>
          @if (isRoleUpdating()(user.id)) {
            <p class="role-updating">Guardando...</p>
          }
        </div>

        <button
          type="button"
          class="delete-user-btn"
          [disabled]="isDeletingUser()(user.id) || isRoleUpdating()(user.id) || isLastAdmin()(user.id)"
          (click)="deleteUser.emit(user)"
        >
          {{ isDeletingUser()(user.id) ? 'Borrando...' : 'Borrar usuario' }}
        </button>
      </div>
    </li>
  }
</ul>
