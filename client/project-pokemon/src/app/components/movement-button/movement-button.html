<button (click)="onClickMove()" [class]="'move type-' + move.type.toLowerCase()" [disabled]="disabled">
    <div class="move-main">
        <img [src]="getTypeIconSrc(move.type)" [alt]="move.type">
        <span class="move-name">{{move.name}}</span>
    </div>
    <div class="move-pp">{{move.currentPp}}/{{move.pp}}</div>
</button>
