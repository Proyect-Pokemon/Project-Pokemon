<div class="modal-overlay" (click)="onOverlayClick($event)">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="fav-modal-title">
    <header class="modal-header">
      <h3 id="fav-modal-title">Selecciona tu equipo favorito</h3>
      <button
        type="button"
        class="modal-close-btn"
        aria-label="Cerrar"
        [disabled]="loading()"
        (click)="close.emit()"
      >✕</button>
    </header>

    @if (error()) {
      <p class="modal-error">{{ error() }}</p>
    }

    <div class="team-list">
      @for (team of teams(); track team.id) {
        <button
          type="button"
          class="team-option"
          [disabled]="loading()"
          (click)="select.emit(team.id)"
        >
          <span class="team-name">{{ team.name }}</span>
          <span class="team-count">{{ team.pokemonCount }}/6 Pokémon</span>
        </button>
      }
    </div>

    <footer class="modal-footer">
      <button type="button" class="btn-secondary" [disabled]="loading()" (click)="close.emit()">
        Cancelar
      </button>
    </footer>
  </div>
</div>
