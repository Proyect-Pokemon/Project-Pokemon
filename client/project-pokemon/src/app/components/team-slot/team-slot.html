<div class="team-slot">
    <div class="team-button-row">
        <button class="team-button" (click)="onToggle()">
            <span class="team-name">{{ team.name }}</span>
            <span class="arrow" [class.expanded]="team.isExpanded">▼</span>
        </button>
        <span class="team-edit-icon" aria-hidden="true"></span>
    </div>
    
    @if (team.isExpanded) {
        <div class="pokemon-list">
            @for (slot of getPokemonSlots(); track $index) {
                @if (slot !== null) {
                    <button class="pokemon-slot filled" (click)="onAddPokemon(slot.slot)">
                        <div class="pokemon-sprite-container">
                                @if (slot.pokemon) {
                                    <img [src]="slot.pokemon.spriteFront" [alt]="slot.pokemon.name" class="pokemon-sprite">
                            }
                            <span class="pokemon-number">#{{ slot.pokemonId }}</span>
                        </div>
                        @if (slot.nickname) {
                            <span class="pokemon-nickname">{{ slot.nickname }}</span>
                        }
                    </button>
                } @else {
                    <button class="pokemon-slot empty" (click)="onAddPokemon(getSlotNumber($index))">
                        <span class="plus-icon">+</span>
                        <span class="slot-number">Slot {{ getSlotNumber($index) }}</span>
                    </button>
                }
            }
        </div>
    }
</div>
