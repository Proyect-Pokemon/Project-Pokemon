<div class="modal-overlay" (click)="onOverlayClick($event)">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="pwd-modal-title">
    <header class="modal-header">
      <h3 id="pwd-modal-title">Cambiar contraseña</h3>
      <button
        type="button"
        class="modal-close-btn"
        aria-label="Cerrar"
        [disabled]="loading()"
        (click)="close.emit()"
      >✕</button>
    </header>

    @if (error()) {
      <p class="modal-error">{{ error() }}</p>
    }

    <div class="fields">
      <div class="field-group">
        <label for="pwd-current">Contraseña actual</label>
        <input
          id="pwd-current"
          type="password"
          class="text-input"
          [value]="currentPassword()"
          [disabled]="loading()"
          (input)="onInput($event, 'current')"
          autocomplete="current-password"
        />
      </div>

      <div class="field-group">
        <label for="pwd-new">Nueva contraseña</label>
        <input
          id="pwd-new"
          type="password"
          class="text-input"
          [value]="newPassword()"
          [disabled]="loading()"
          (input)="onInput($event, 'new')"
          autocomplete="new-password"
        />
      </div>

      <div class="field-group">
        <label for="pwd-confirm">Confirmar nueva contraseña</label>
        <input
          id="pwd-confirm"
          type="password"
          class="text-input"
          [value]="confirmPassword()"
          [disabled]="loading()"
          (input)="onInput($event, 'confirm')"
          autocomplete="new-password"
        />
      </div>
    </div>

    <footer class="modal-footer">
      <button type="button" class="btn-secondary" [disabled]="loading()" (click)="close.emit()">
        Cancelar
      </button>
      <button type="button" class="btn-primary" [disabled]="loading()" (click)="save.emit()">
        {{ loading() ? 'Guardando...' : 'Guardar' }}
      </button>
    </footer>
  </div>
</div>
