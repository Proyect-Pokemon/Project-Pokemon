<header>
    <nav class="navbar">
        <a routerLink="/landing" class="nav-brand">
            <span class="nav-brand-text">Project Pokémon</span>
        </a>

        <button
            class="hamburger-btn"
            [class.open]="menuOpen()"
            (click)="toggleMenu()"
            aria-label="Abrir menú"
        >
            @if (menuOpen()) {
                <span class="hamburger-close">✕</span>
            } @else {
                <img src="/assets/icons/UI/menu-hamburguesa.svg" alt="Menú" class="hamburger-icon" />
            }
        </button>

        <ul class="nav-links" [class.open]="menuOpen()" (click)="closeMenu()">
            @if (isAuthenticated()) {
                <li><a routerLink="/battle">Combate</a></li>
            }
            <li><a routerLink="/about">Sobre nosotros</a></li>
            @if (isAuthenticated()) {
                <li><a routerLink="/team-builder">Equipos</a></li>
                @if (isAdmin()) {
                    <li><a routerLink="/admin-panel">Administración</a></li>
                }
                <li><a routerLink="/profile">Perfil</a></li>
            } @else {
                <li><a routerLink="/login">Iniciar sesión</a></li>
                <li><a routerLink="/register">Registrarse</a></li>
            }
        </ul>
    </nav>
</header>

<main class="page-content">
    <router-outlet></router-outlet>
</main>

<footer>Project Pokémon - 2026</footer>
